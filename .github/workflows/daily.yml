name: 川普每日摘要

on:
  workflow_dispatch:      # 允許手動觸發

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      CNN_ARCHIVE_URL: ${{ secrets.CNN_ARCHIVE_URL }}
      TRUTH_SOCIAL_ACCOUNT_ID: ${{ secrets.TRUTH_SOCIAL_ACCOUNT_ID }}
      TRUTH_SOCIAL_API_URL: ${{ secrets.TRUTH_SOCIAL_API_URL }}
      REQUEST_TIMEOUT: "30"
      RECENT_HOURS: "24"
      TRANSLATE_ENABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily digest
        run: python3 -u trump_dailydigest.py

      - name: Notify on failure
        if: failure()
        run: |
          python3 -c "
          import urllib.request, urllib.parse, json, os, ssl

          payload = json.dumps({
              'to': os.environ['MAIL_TO'],
              'subject': '⚠️ 川普每日摘要：今日執行失敗',
              'body': 'GitHub Actions workflow 執行失敗，請至以下網址查看 log：\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
          }).encode('utf-8')
          req = urllib.request.Request(
              os.environ['WEBHOOK_URL'],
              data=payload,
              headers={'Content-Type': 'application/json; charset=utf-8'},
          )
          urllib.request.urlopen(req, timeout=30, context=ssl.create_default_context())
          print('失敗通知已寄出')
          "
